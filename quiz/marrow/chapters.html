<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Chapter - Q Bank</title>
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="../qbank-main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="../../access-control.js"></script>
</head>
<body>
  
  <header>
    <div class="header-content">
      <button onclick="goBack()" class="back-button">
        <i class="fas fa-arrow-left"></i>
      </button>
      <h1 id="pageTitle">Select Chapter</h1>
      <p class="header-subtitle" id="chapterInfo">Choose your chapter</p>
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search chapters..." id="searchInput">
      </div>
    </div>
  </header>

  <main>
    <div class="selection-container">
      <div class="welcome-section">
        <h2 id="chapterTitle">Available Chapters</h2>
        <p>Select a chapter to start your quiz</p>
      </div>

      <div id="loading" class="loading-container">
        <div class="loading-spinner">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading chapters...</p>
        </div>
      </div>

      <div class="chapters-grid" id="chaptersGrid" style="display: none;">
        <!-- Chapters will be loaded dynamically -->
      </div>

      <div id="no-chapters" class="error-container" style="display: none;">
        <div class="error-content">
          <i class="fas fa-book-open"></i>
          <h3>No Chapters Available</h3>
          <p>No chapters found for this subject. Please check if JSON files are uploaded.</p>
          <button onclick="goBack()" class="action-btn">Go Back</button>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="../../app.html"><i class="fas fa-lightbulb"></i><span>Home</span></a>
    <a href="../../platforms.html"><i class="fas fa-play-circle"></i><span>Videos</span></a>
    <a href="../../search.html"><i class="fas fa-search"></i><span>Search</span></a>
    <a href="../index.html" class="active"><i class="fas fa-question-circle"></i><span>Q Bank</span></a>
  </nav>

  <script>
    function goBack() {
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform');
      window.location.href = `subjects.html?platform=${platform}`;
    }

    async function loadChapters() {
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform');
      const subject = urlParams.get('subject');
      
      if (!platform || !subject) {
        window.location.href = 'platforms.html';
        return;
      }

      document.getElementById('chapterInfo').textContent = `${platform.charAt(0).toUpperCase() + platform.slice(1)} - ${subject.charAt(0).toUpperCase() + subject.slice(1)}`;
      document.getElementById('chapterTitle').textContent = `${subject.charAt(0).toUpperCase() + subject.slice(1)} Chapters`;

      try {
        // Get predefined chapters for this subject
        const subjectChapters = getSubjectChapters(subject);
        const availableChapters = [];
        
        // For Marrow platform, use direct chapter names
        for (const chapter of subjectChapters) {
          const filename = `${chapter}.json`;
          try {
            const fileResponse = await fetch(`${platform}/${subject}/${filename}`);
            if (fileResponse.ok) {
              const data = await fileResponse.json();
              if (data.questions && data.questions.length > 0) {
                availableChapters.push({
                  name: data.chapter || chapter.replace(/_/g, ' '),
                  filename: filename,
                  questionCount: data.questions.length
                });
              }
            }
          } catch (error) {
            console.error(`Error loading ${filename}:`, error);
          }
        }

        displayChapters(availableChapters);
      } catch (error) {
        console.error('Error loading chapters:', error);
        showNoChapters();
      }
    }

    function displayChapters(chapters) {
      const loading = document.getElementById('loading');
      const chaptersGrid = document.getElementById('chaptersGrid');
      const noChapters = document.getElementById('no-chapters');
      
      loading.style.display = 'none';
      
      if (chapters.length === 0) {
        showNoChapters();
        return;
      }
      
      noChapters.style.display = 'none';
      chaptersGrid.style.display = 'block';
      
      chaptersGrid.innerHTML = chapters.map(chapter => `
        <div class="subject-card" onclick="selectChapter('${chapter.filename}', '${chapter.name}')">
          <div class="subject-icon">
            <i class="fas fa-book"></i>
          </div>
          <div class="subject-content">
            <h3>${chapter.name}</h3>
            <p>${chapter.questionCount} questions</p>
          </div>
        </div>
      `).join('');
    }

    function showNoChapters() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('chaptersGrid').style.display = 'none';
      document.getElementById('no-chapters').style.display = 'block';
    }

    function selectChapter(filename, chapterName) {
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform');
      const subject = urlParams.get('subject');
      
      window.location.href = `quiz.html?platform=${platform}&subject=${subject}&chapter=${filename}`;
    }

    function getSubjectChapters(subject) {
      // Return specific chapters for each subject
      const subjectChapters = {
        anaesthesia: ['ACLS'],
        anatomy: ['Abdominal_cavity_and_Peritoneum', 'Alimentary__Hepatobiliary_systems__Pancreas_and', 'Anterior_Abdominal_Wall', 'Basal_Ganglia_and_Limbic_System', 'Bone__Cartilage___Muscular_Tissue', 'Bones__Joints_and_Cartilage', 'Bones_of_the_Lower_Limb', 'Brachial_Plexus_and_Nerves', 'Brainstem', 'Breast', 'Cardiovascular__Lymphatic_and_Nervous_Systems', 'Cardiovascular__Lymphatic_and_Respiratory_Systems', 'Cardiovascular_and_Respiratory_Systems', 'Cell_Structure__Epithelia__Glands___Connective', 'Cerebellum', 'Cerebrum', 'Cranial_Nerves', 'Deep_fascia_and_Triangles_of_the_neck', 'Diaphragm', 'Diencephalon', 'Digestive__Hepatobiliary___Genitourinary_Systems', 'Embryonic_Phase_of_Development', 'Face__Nose___Palate__Eye__Ear', 'Fossae_and_Spaces_of_the_Upper_Limb', 'GI_Tract', 'Gametogenesis', 'General_Anatomy_of_Thorax', 'Glands_of_the_Head_and_Neck', 'Heart', 'Hepatobiliary_system__Spleen___Pancreas', 'Important_Structures_of_Lower_Limb', 'Internal_and_external_genitalia', 'Joints_of_the_Lower_Limb', 'KUB___Adrenal_Gland', 'Larynx', 'Lungs_and_Pleura', 'Mediastinum', 'Meninges_and_dural_venous_sinuses', 'Muscles_-_Upper_Limb', 'Muscles__Neurovascular_Anatomy_of_Head___Neck', 'Muscles_and_Tendons', 'Muscles_of_the_Lower_Limb', 'Nerves___Vessels_of_Lower_Limb', 'Nervous_System_and_Endocrine_Glands', 'Nervous_and_Endocrine_Systems', 'Osteology__Scalp_and_Face', 'Pelvis___Perineum', 'Pharyngeal_arches__Skeletal___Muscular_Systems', 'Pharynx', 'Placenta__Fetal_Membranes_and_Twinning', 'Pre-Embryonic_Phase_of_Development', 'Skin__Connective_Tissue_and_Ligaments', 'Skin___Special_Senses__Eye_and_Ear', 'Spinal_Cord', 'Thoracic_Wall', 'Tongue_and_Palate', 'Upper_Limb_Bones_and_Joints', 'Urogenital_System', 'Vascular_supply_of_Brain', 'Ventricular_System_and_Subarachnoid_Space', 'Vertebral_Column', 'Vessels-Upper_limb', 'White_Matter_of_the_Brain'],
        biochemistry: ['Cell_and_Cell_Organelles', 'Carbohydrates', 'Proteins', 'Lipids', 'Enzymes'],
        dermatology: ['Anatomy_and_Physiology_of_Skin', 'Dermatitis_and_Eczema'],
        ent: ['Anatomy_of_Mastoid', 'External_Ear', 'Middle_Ear', 'Inner_Ear'],
        fmt: ['Introduction_to_Forensic_Medicine', 'Thanatology'],
        medicine: ['Cardiology', 'Respiratory_Medicine', 'Gastroenterology'],
        microbiology: ['General_Microbiology', 'Bacteriology', 'Virology'],
        obgy: ['Anatomy_of_Female_Reproductive_System', 'Physiology_of_Menstrual_Cycle'],
        ophthalmology: ['Anatomy_of_Eye', 'Physiology_of_Vision'],
        orthopaedics: ['Basic_Sciences_in_Orthopedics', 'Fractures'],
        pathology: ['Cell_Injury', 'Inflammation', 'Healing_and_Repair'],
        pediatrics: ['Growth_and_Development', 'Neonatology'],
        pharmacology: ['General_Pharmacology', 'Autonomic_Nervous_System'],
        physiology: ['General_Physiology', 'Blood', 'Cardiovascular_System'],
        psychiatry: ['General_Psychiatry', 'Schizophrenia'],
        radiology: ['Physics_of_Radiology', 'Chest_Radiology'],
        surgery: ['Wounds_and_Wound_Healing', 'Shock_and_Resuscitation']
      };
      
      // Return chapters for this subject or empty array
      return subjectChapters[subject] || [];
    }

    window.addEventListener('load', loadChapters);
  </script>
</body>
</html>
